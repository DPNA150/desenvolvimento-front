<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / ALBINOTICIAS</title>
    <link rel="stylesheet" href="https://dpna150.github.io/desenvolvimento-front/CSS/styleLogin.css">
</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logoArea">
            <img src="https://dpna150.github.io/desenvolvimento-front/logoDPNA.png">
            <h1>ALBINOTICIAS</h1>
        </div>

        <nav>
            <a href="https://dpna150.github.io/desenvolvimento-front/">Início</a>
            <a href="pesq.html">Pesquisar</a>
        </nav>

    </header>

    <!-- MAIN -->

    <main>

        <div class="loginCard">

            <div class="toggle-container">

                <input type="radio" id="log" name="conta" value="login" checked>
                <input type="radio" id="cad" name="conta" value="Cadastro">

                <div class="toggle">
                    <label for="log" class="option">Login</label>
                    <label for="cad" class="option">Cadastro</label>
                    <span class="slider"></span>
                </div>

            </div>

            <h2 id="form-title">Login</h2>

            <!-- LOGIN -->

            <form id="login-form">

                <input type="text" id="login-username" placeholder="Nome de usuário" required>

                <input type="password" id="login-password" placeholder="Senha" required>

                <button type="submit">
                    Entrar
                </button>

            </form>

            <!-- CADASTRO -->

            <form id="signup-form" style="display: none;">

                <input type="text" id="signup-username" placeholder="Nome de usuário" required>

                <input type="email" id="signup-email" placeholder="Email" required>

                <input type="date" id="signup-birthdate" required>

                <input type="tel" id="signup-number" placeholder="Número de telefone" required>

                <input type="password" id="signup-password" placeholder="Senha" required>

                <input type="password" id="signup-confirm-password" placeholder="Confirmar Senha" required>

                <button type="submit">
                    Continuar
                </button>

            </form>

            <!-- ETAPA FINAL -->

            <form id="signup-form2" style="display: none;">

                <select id="tema-user" required>

                    <option disabled selected>
                        Selecione o tema
                    </option>

                    <option>Futebol Europeu</option>
                    <option>Futebol Inglês</option>
                    <option>Futebol Brasileiro</option>

                </select>

                <button type="submit">
                    Cadastrar
                </button>

            </form>

        </div>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>
            &copy; 2026 ALBINOTICIAS — Todos os direitos reservados.
        </p>

    </footer>

    <script src="https://dpna150.github.io/desenvolvimento-front/JS/scriptLogin.js"></script>

</body>

</html>
