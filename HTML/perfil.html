<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil / ALBINOTICIAS</title>
        <link rel="stylesheet" href="https://dpna150.github.io/desenvolvimento-front/CSS/stylePerfil.css">
</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logoArea">
            <img src="/logoDPNA.png">
            <h1>ALBINOTICIAS</h1>
        </div>

        <nav>
            <a href="https://dpna150.github.io/desenvolvimento-front/">Início</a>
            <a href="pesq.html">Pesquisar</a>
        </nav>

    </header>

    <!-- MAIN -->

    <main>

        <div class="perfil-container">

            <!-- TOPO -->

            <div class="perfil-topo">

                <img src="user.png" alt="Foto do usuário">

                <div class="perfil-info">

                    <h2>Nome do Usuário</h2>

                    <p>@usuario</p>

                    <button>
                        Editar Perfil
                    </button>

                </div>

            </div>

            <!-- BIO -->

            <div class="bio">

                <h3>Bio</h3>

                <p>
                    Coloque aqui uma descrição do usuário.
                    Pode ser interesses, profissão ou qualquer informação.
                </p>

            </div>

            <!-- POSTS -->

            <div class="posts">

                <h3>Postagens</h3>

                <div class="post">
                    <p><strong>Post 1:</strong> Conteúdo do post do usuário.</p>
                </div>

                <div class="post">
                    <p><strong>Post 2:</strong> Outro conteúdo aqui.</p>
                </div>

            </div>

        </div>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>
            &copy; 2026 ALBINOTICIAS — Todos os direitos reservados.
        </p>

    </footer>

    <script src="JS/scriptPerfil.js"></script>

</body>

</html>
