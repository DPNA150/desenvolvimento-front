<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="stylesheet" href="/CSS/stylePerfil.css">
</head>

<body>

    <header>
        <img src="/logoDPNA.png" alt="Logo">
        <h1>ALBINOTICIAS</h1>

        <nav>
            <a href="/HTML/index.html">Início</a>
            <a href="/HTML/pesq.html">Pesquisar</a>
        </nav>
    </header>

    <main>
        <div class="perfil-container">

            <div class="perfil-topo">
                <img src="user.png" alt="Foto do usuário">

                <div class="perfil-info">
                    <h2>Nome do Usuário</h2>
                    <p>@usuario</p>
                    <button>Editar Perfil</button>
                </div>
            </div>

            <div class="bio">
                <h3>Bio</h3>
                <p>Coloque aqui uma descrição do usuário. Pode ser interesses, profissão ou qualquer informação.</p>
            </div>

            <div class="posts">
                <h3>Postagens</h3>

                <div class="post">
                    <p><strong>Post 1:</strong> Conteúdo do post do usuário.</p>
                </div>

                <div class="post">
                    <p><strong>Post 2:</strong> Outro conteúdo aqui.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ALBINOTICIAS. Todos os direitos reservados.</p>
    </footer>

</body>

<script src="/JS/scriptPerfil.js"></script>

</html>
